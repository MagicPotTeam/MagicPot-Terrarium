[package]
name = "canvas-thumbnail-sidecar"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Native thumbnail sidecar MVP for MagicPot canvas assets"

[dependencies]
anyhow = "1.0"
base64 = "0.22"
blake3 = "1.5"
clap = { version = "4.5", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["bmp", "jpeg", "png", "webp"] }
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
thiserror = "2.0"

[dev-dependencies]
tempfile = "3.12"
