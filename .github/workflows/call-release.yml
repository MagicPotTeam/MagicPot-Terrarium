name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: The tag name to release
        type: string
        required: true
      release_name:
        description: The release name to release
        type: string
        required: true
      ref:
        description: The ref to release
        type: string
        default: 'refs/heads/master'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    outputs:
      github_release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/
            ~/AppData/Local/electron-builder/
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache embedded Python downloads
        uses: actions/cache@v4
        with:
          path: .cache/embedded-python
          key: ${{ runner.os }}-embedded-python-${{ hashFiles('scripts/prepare-embedded-python.mjs') }}
          restore-keys: |
            ${{ runner.os }}-embedded-python-

      - name: Build package
        run: |
          npm run build:embedded
          npm run prepare:embedded
          npx cross-env PACKAGE_MODE=embedded npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ inputs.tag_name }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/embedded/*-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  send-to-discord:
    runs-on: ubuntu-latest
    needs: [release-windows]
    steps:
      - name: Send to Discord
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            new release:
            version:
            ${{ inputs.tag_name }}
            release:
            ${{ inputs.release_name }}
            github release url:
            ${{ needs.release-windows.outputs.github_release_url }}
