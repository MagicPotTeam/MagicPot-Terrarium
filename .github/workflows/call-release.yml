name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: The tag name to release
        type: string
        required: true
      release_name:
        description: The release name to release
        type: string
        required: true
      ref:
        description: The ref to release
        type: string
        default: 'refs/heads/master'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    outputs:
      github_release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/
            ~/AppData/Local/electron-builder/
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache embedded Python downloads
        uses: actions/cache@v4
        with:
          path: .cache/embedded-python
          key: ${{ runner.os }}-embedded-python-${{ hashFiles('scripts/prepare-embedded-python.mjs') }}
          restore-keys: |
            ${{ runner.os }}-embedded-python-

      - name: Build package
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          npm run build:embedded
          npm run prepare:embedded
          npx cross-env PACKAGE_MODE=embedded npm run package:win -- --publish never

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $assetsDir = 'dist/release-assets'
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null
          Get-ChildItem -LiteralPath $assetsDir -Force | Remove-Item -Force

          $archiveFiles = @(
            Get-ChildItem -LiteralPath 'dist/embedded' -File |
              Where-Object { $_.Name -like '*-win.7z' -or $_.Name -like '*-win.zip' }
          )
          if ($archiveFiles.Count -ne 1) {
            throw "Expected exactly one Windows archive, found $($archiveFiles.Count)"
          }

          $archive = $archiveFiles[0]
          [int64]$githubLimitBytes = [int64]2147483648

          if ($archive.Length -ge $githubLimitBytes) {
            throw "Windows archive exceeds GitHub's single-asset size limit: $($archive.Name) is $($archive.Length) bytes"
          }

          Copy-Item -LiteralPath $archive.FullName -Destination (Join-Path $assetsDir $archive.Name)

          Get-ChildItem -LiteralPath $assetsDir | Select-Object Name,Length

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ inputs.tag_name }}
          target_commitish: ${{ inputs.ref }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Windows embedded builds are distributed as single `.7z` archives.
          files: |
            dist/release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  send-to-discord:
    runs-on: ubuntu-latest
    needs: [release-windows]
    steps:
      - name: Send to Discord
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            new release:
            version:
            ${{ inputs.tag_name }}
            release:
            ${{ inputs.release_name }}
            github release url:
            ${{ needs.release-windows.outputs.github_release_url }}
