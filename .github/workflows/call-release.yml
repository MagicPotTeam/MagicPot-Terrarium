name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: The tag name to release
        type: string
        required: true
      release_name:
        description: The release name to release
        type: string
        required: true
      ref:
        description: The ref to release
        type: string
        default: 'refs/heads/master'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    outputs:
      github_release_url: ${{ steps.create_release.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/
            ~/AppData/Local/electron-builder/
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache embedded Python downloads
        uses: actions/cache@v4
        with:
          path: .cache/embedded-python
          key: ${{ runner.os }}-embedded-python-${{ hashFiles('scripts/prepare-embedded-python.mjs') }}
          restore-keys: |
            ${{ runner.os }}-embedded-python-

      - name: Build embedded package
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          npm run build:embedded
          npm run prepare:embedded
          npx cross-env PACKAGE_MODE=embedded npm run package:win -- --publish never

      - name: Build pure package
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          npm run build:pure
          npx cross-env PACKAGE_MODE=pure npm run package:win -- --publish never

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $assetsDir = 'dist/release-assets'
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null
          Get-ChildItem -LiteralPath $assetsDir -Force | Remove-Item -Force

          $embeddedArchives = @(
            Get-ChildItem -LiteralPath 'dist/embedded' -File |
              Where-Object { $_.Name -like 'magicpot-*-win.7z' }
          )
          if ($embeddedArchives.Count -ne 1) {
            throw "Expected exactly one embedded Windows .7z archive, found $($embeddedArchives.Count)"
          }

          $pureSetups = @(
            Get-ChildItem -LiteralPath 'dist/pure' -File |
              Where-Object { $_.Name -like 'magicpot-*-setup.exe' }
          )
          if ($pureSetups.Count -ne 1) {
            throw "Expected exactly one pure setup.exe, found $($pureSetups.Count)"
          }

          $pureBlockmaps = @(
            Get-ChildItem -LiteralPath 'dist/pure' -File |
              Where-Object { $_.Name -like 'magicpot-*-setup.exe.blockmap' }
          )
          if ($pureBlockmaps.Count -ne 1) {
            throw "Expected exactly one pure setup.exe.blockmap, found $($pureBlockmaps.Count)"
          }

          $pureLatest = Get-Item -LiteralPath 'dist/pure/latest.yml'

          $releaseFiles = @($embeddedArchives[0], $pureSetups[0], $pureBlockmaps[0], $pureLatest)
          [int64]$githubLimitBytes = [int64]2147483648

          foreach ($releaseFile in $releaseFiles) {
            if ($releaseFile.Length -ge $githubLimitBytes) {
              throw "Release asset exceeds GitHub's single-asset size limit: $($releaseFile.Name) is $($releaseFile.Length) bytes"
            }
            Copy-Item -LiteralPath $releaseFile.FullName -Destination (Join-Path $assetsDir $releaseFile.Name)
          }

          Get-ChildItem -LiteralPath $assetsDir | Select-Object Name,Length

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release/${{ inputs.tag_name }}
          target_commitish: ${{ inputs.ref }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Windows releases include:
            - embedded `.7z` for first-time full runtime delivery
            - `setup.exe`, `.blockmap`, and `latest.yml` for app-body auto-updates
          files: |
            dist/release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
